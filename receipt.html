<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quikka - Receipt</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <meta property="og:title" content="Quikka">
  <meta property="og:description" content="Secure payments and fast checkout with Quikka.">
  <meta property="og:image" content="/assets/logo-web.png">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div id="app" class="bg-white rounded-xl shadow-lg p-8 w-full max-w-lg">
    <div class="animate-pulse flex space-x-4">
      <div class="flex-1 space-y-4 py-1">
        <div class="h-4 bg-gray-200 rounded w-3/4"></div>
        <div class="space-y-2">
          <div class="h-4 bg-gray-200 rounded"></div>
          <div class="h-4 bg-gray-200 rounded w-5/6"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = "/api";
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const purchaseId = pathParts[pathParts.length - 1];

    async function fetchReceipt() {
      if (!purchaseId || purchaseId === "receipt" || purchaseId.trim() === "") {
        renderError("Invalid Receipt Link.");
        return;
      }

      try {
        const response = await fetch(`${BACKEND_URL}/payments/receipts/${purchaseId}`, {
          headers: {
            'ngrok-skip-browser-warning': 'true'
          }
        });
        
        if (!response.ok) {
            if (response.status === 404) {
                renderError("Receipt not found.");
            } else {
                throw new Error("Could not load receipt.");
            }
            return;
        }

        const data = await response.json();
        
        if (!data.order || !data.merchant) {
            renderError("Receipt details are incomplete.");
            return;
        }

        renderReceipt(data);

        // Auto-refresh if the order status hasn't updated from the webhook yet
        if (data.escrow_status !== 'pending_escrow' && data.escrow_status !== 'cleared') {
            setTimeout(fetchReceipt, 3000);
        }
      } catch (err) {
        renderError("Could not connect to Quikka Backend. " + err.message);
      }
    }

    function renderError(msg) {
      document.getElementById('app').innerHTML = `
        <div class="text-center">
            <h2 class="text-xl font-bold text-red-600 mb-2">Error</h2>
            <p class="text-gray-600">${msg}</p>
        </div>
      `;
    }

    function renderReceipt(data) {
      const app = document.getElementById('app');
      
      const shortToken = data.receipt_token ? data.receipt_token.substring(0, 8).toUpperCase() : data.id;
      const whatsappMsg = encodeURIComponent(`Hi, I just paid for an order. My Receipt ID is QK-REC-${shortToken}`);
      const whatsappUrl = `https://wa.me/${data.merchant.phone || ''}?text=${whatsappMsg}`;
      
      const totalPaid = (data.order.item_price * data.quantity) + (data.order.delivery_fee || 0);

      app.innerHTML = `
        <div class="text-center py-6">
          <h2 class="text-2xl font-bold text-gray-900 mb-1">${data.merchant.display_name || 'Checkout'}</h2>
          <h3 class="text-xl font-bold text-green-600 mb-6">Payment Successful!</h3>
          
          <div class="bg-gray-50 border border-gray-200 rounded-xl p-5 mb-6 text-left shadow-inner">
            <div class="flex justify-between items-center mb-3">
              <span class="text-gray-500 text-sm">Item</span>
              <span class="font-medium text-gray-900">${data.order.item_desc}</span>
            </div>
            <div class="flex justify-between items-center mb-3">
              <span class="text-gray-500 text-sm">Total Paid</span>
              <span class="font-bold text-gray-900">KES ${totalPaid.toLocaleString()}</span>
            </div>
            <div class="flex justify-between items-center mb-3">
              <span class="text-gray-500 text-sm">Merchant</span>
              <span class="font-medium text-gray-900">${data.merchant.display_name || 'N/A'}</span>
            </div>
            <div class="flex justify-between items-center pt-3 border-t border-gray-200">
              <span class="text-gray-500 text-sm">Receipt ID</span>
              <span class="font-mono text-gray-700 bg-gray-200 px-2 py-1 rounded text-sm">QK-REC-${shortToken}</span>
            </div>
          </div>
          
          ${data.escrow_status === 'pending_escrow' ? `
          <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-5 mb-6 text-center shadow-sm">
            <h4 class="text-sm font-bold text-yellow-800 uppercase tracking-wide mb-1">Escrow Delivery PIN</h4>
            <div class="text-3xl font-mono font-black text-gray-900 mb-2 tracking-[0.2em]">${data.delivery_pin || '----'}</div>
            <p class="text-xs text-yellow-700 mb-4">
              ⚠️ <strong>IMPORTANT:</strong> Do not share this PIN or click Confirm Delivery until you have physically received and inspected your items.
            </p>
            <button id="confirmDeliveryBtn" onclick="confirmDelivery()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md flex items-center justify-center gap-2">
              <span id="btnText">Confirm Delivery</span>
              <svg id="btnSpinner" class="animate-spin hidden h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
          </div>
          ` : data.escrow_status === 'cleared' ? `
          <div class="bg-green-50 border border-green-200 rounded-xl p-4 mb-6 flex items-center justify-center gap-2 text-green-700 font-bold shadow-sm">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Delivery Confirmed
          </div>
          ` : `
          <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6 flex items-center justify-center gap-2 text-blue-700 font-bold shadow-sm">
            <svg class="animate-spin h-5 w-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            Verifying Payment...
          </div>
          `}
          
          
          <a href="${whatsappUrl}" target="_blank" rel="noopener noreferrer" class="w-full bg-[#25D366] hover:bg-[#128C7E] text-white font-bold py-3.5 px-4 rounded-lg transition-colors flex items-center justify-center gap-2 mb-2 shadow-md">
            <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
            Chat on WhatsApp
          </a>
        </div>
        <div class="mt-8 text-center border-t border-gray-100 pt-4 flex items-center justify-center gap-3">
          <p class="text-xs text-gray-400 font-medium tracking-wide">POWERED BY <span class="text-green-600 font-bold">QUIKKA</span></p>
          <span class="text-gray-300 text-xs">|</span>
          <img src="/assets/intasend-logo-light.png" alt="Secured by IntaSend" class="h-4 object-contain opacity-60">
        </div>
      `;
    }

    fetchReceipt();

    async function confirmDelivery() {
      if (!confirm("Are you sure you want to release the funds to the merchant? Only do this if you have received your items in good condition.")) {
        return;
      }

      const btn = document.getElementById('confirmDeliveryBtn');
      const btnText = document.getElementById('btnText');
      const btnSpinner = document.getElementById('btnSpinner');

      btn.disabled = true;
      btnText.classList.add('hidden');
      btnSpinner.classList.remove('hidden');

      try {
        const response = await fetch(`${BACKEND_URL}/payments/receipts/${purchaseId}/confirm_delivery`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          const errData = await response.json();
          throw new Error(errData.detail || "Failed to confirm delivery.");
        }

        alert("Success! The funds have been released to the merchant.");
        // Reload to update UI
        window.location.reload();
      } catch (err) {
        alert("Error: " + err.message);
        btn.disabled = false;
        btnText.classList.remove('hidden');
        btnSpinner.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
