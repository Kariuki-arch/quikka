<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quikka - Secure Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <meta property="og:title" content="Quikka">
  <meta property="og:description" content="Secure payments and fast checkout with Quikka.">
  <meta property="og:image" content="/assets/logo-web.png">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div id="app" class="bg-white rounded-xl shadow-lg p-8 w-full max-w-lg">
    <div class="animate-pulse flex space-x-4">
      <div class="flex-1 space-y-4 py-1">
        <div class="h-4 bg-gray-200 rounded w-3/4"></div>
        <div class="space-y-2">
          <div class="h-4 bg-gray-200 rounded"></div>
          <div class="h-4 bg-gray-200 rounded w-5/6"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // We use a relative path proxy to hide the actual backend URL from public exposure.
    // Ensure your Nginx or hosting provider proxies requests from '/api' to your backend server.
    const BACKEND_URL = "/api";


    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const trackingCode = pathParts[pathParts.length - 1];
    
    const urlParams = new URLSearchParams(window.location.search);
    const isDemoMode = urlParams.get('demo') === 'true';

    let currentOrder = null;
    let currentMerchant = null;
    let pollInterval = null;
    let purchasePollInterval = null;
    let currentPurchaseId = null;
    let currentPurchaseStatus = null;
    let selectedQuantity = 1;
    let currentLocationText = '';
    let currentLat = null;
    let currentLon = null;
    let gpsRequested = false;

    async function fetchOrder() {
      if (!trackingCode || trackingCode === "checkout" || trackingCode.trim() === "") {
        renderError("Invalid Tracking Link. Please check the URL you were sent.");
        return;
      }

      try {
        const response = await fetch(`${BACKEND_URL}/orders/track/${trackingCode}`, {
          headers: {
            'ngrok-skip-browser-warning': 'true'
          }
        });
        if (!response.ok) throw new Error("Order not found or server unreachable");

        const data = await response.json();

        // Fetch merchant details once
        if (!currentMerchant && data.merchant_id) {
          try {
            const mRes = await fetch(`${BACKEND_URL}/merchants/${data.merchant_id}`, {
              headers: {
                'ngrok-skip-browser-warning': 'true'
              }
            });
            if (mRes.ok) {
              currentMerchant = await mRes.json();
            } else {
              currentMerchant = { display_name: "Checkout" };
            }
          } catch (e) {
            currentMerchant = { display_name: "Checkout" };
          }
        }

        if (!currentOrder) {
          currentOrder = data;
          
          const savedId = localStorage.getItem(`quikka_purchase_${currentOrder.id}`);
          if (savedId) {
            currentPurchaseId = savedId;
            currentPurchaseStatus = 'stk_pending'; 
            startPurchasePolling();
          }

          renderApp();
          renderApp();
        } else if (currentOrder.status !== data.status) {
          currentOrder = data;
          renderApp();
          const savedId = localStorage.getItem(`quikka_purchase_${currentOrder.id}`);
          if (savedId) {
            currentPurchaseId = savedId;
            currentPurchaseStatus = 'stk_pending'; 
            startPurchasePolling();
          }

          renderApp();
        }
      } catch (err) {
        renderError("Could not connect to Quikka Backend. " + err.message);
      }
    }

    function renderError(msg) {
      document.getElementById('app').innerHTML = `
        <div class="text-center">
            <h2 class="text-xl font-bold text-red-600 mb-2">Checkout Error</h2>
            <p class="text-gray-600">${msg}</p>
        </div>
      `;
    }

    function renderLandingPage() {
      document.getElementById('app').innerHTML = `
        <div class="text-center py-8">
          <div class="mx-auto bg-green-100 rounded-full w-20 h-20 flex items-center justify-center mb-6 shadow-sm">
             <span class="text-green-600 font-black text-3xl">Q</span>
          </div>
          <h1 class="text-4xl font-extrabold text-gray-900 mb-3 tracking-tight">Quikka</h1>
          <p class="text-gray-500 mb-8 text-lg px-2">The smart checkout & dispatch assistant for WhatsApp merchants.</p>
          
          <div class="bg-gray-50 rounded-2xl p-6 mb-8 text-left border border-gray-100 shadow-inner">
            <h3 class="font-bold text-gray-800 text-lg mb-2">Are you a merchant?</h3>
            <p class="text-sm text-gray-600 mb-5 leading-relaxed">Automate your M-Pesa verifications and instantly generate dispatch tickets for your customers directly inside WhatsApp.</p>
            <a href="https://wa.me/254710945962?text=Register%3A%20My%20Business" target="_blank" rel="noopener noreferrer" class="block text-center w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-xl transition-colors shadow-md">
              Connect to WhatsApp
            </a>
          </div>
          
          <div class="border-t border-gray-100 pt-6">
            <p class="text-xs text-gray-400 font-bold tracking-widest uppercase">Quikka System</p>
          </div>
        </div>
      `;
    }

    function updateQuantity(change) {
      if (!currentOrder || currentOrder.available_quantity <= 0) return;
      let newVal = selectedQuantity + change;
      if (newVal < 1) newVal = 1;
      if (newVal > currentOrder.available_quantity) newVal = currentOrder.available_quantity;
      selectedQuantity = newVal;
      renderApp();
    }

    function renderApp() {
      const app = document.getElementById('app');

      if (currentOrder.available_quantity <= 0 && !currentPurchaseId && currentPurchaseStatus !== 'completed') {
        app.innerHTML = `
          <div class="text-center py-6">
            <h2 class="text-2xl font-bold text-gray-900 mb-4">${currentMerchant?.display_name || 'Checkout'}</h2>
            <div class="inline-block px-4 py-2 rounded-full font-bold uppercase tracking-wide text-sm bg-red-100 text-red-800">
              Sold Out
            </div>
            <p class="text-gray-500 mt-6 text-sm mb-4">Sorry, there are no more items available for this order.</p>
          </div>
        `;
        return;
      }

      if (!currentPurchaseId && currentPurchaseStatus !== 'stk_pending') {
        const totalAmount = (currentOrder.item_price * selectedQuantity + (currentOrder.delivery_fee || 0)).toLocaleString();
        const errorMsg = currentOrder.status === 'payment_failed'
          ? `<div class="bg-red-50 border border-red-200 text-red-700 p-3 rounded-lg mb-6 text-sm font-medium flex items-center gap-2">
               <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
               Payment failed or was cancelled. Please try again.
             </div>`
          : '';

        app.innerHTML = `
          <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-900 mb-1">${currentMerchant?.display_name || 'Checkout'}</h2>
            <p class="text-gray-500">Complete your payment</p>
          </div>
          
          ${errorMsg}

          <div class="bg-gray-50 rounded-xl p-4 mb-6">
            ${currentOrder.image_url ? `
            <div class="mb-4 rounded-lg overflow-hidden shadow-sm relative h-56 bg-gray-900 flex items-center justify-center">
              <!-- Blurred Background -->
              <img src="${currentOrder.image_url}" alt="" class="absolute inset-0 w-full h-full object-cover scale-125 filter blur-xl opacity-60">
              <!-- Foreground Image -->
              <img src="${currentOrder.image_url}" alt="${currentOrder.item_desc}" class="relative z-10 w-full h-full object-contain p-2 drop-shadow-lg">
            </div>
            ` : ''}
            <div class="flex justify-between items-center mb-2">
              <span class="text-gray-600">Item:</span>
              <span class="font-medium text-gray-900">${currentOrder.item_desc}</span>
            </div>
            <div class="flex justify-between items-center mb-2">
              <span class="text-gray-600">Price:</span>
              <span class="font-medium text-gray-900">KES ${currentOrder.item_price.toLocaleString()}</span>
            </div>
            <div class="flex justify-between items-center mb-4 pb-4 border-b border-gray-200">
              <span class="text-gray-600">Delivery Fee:</span>
              <span class="font-medium text-gray-900">KES ${(currentOrder.delivery_fee || 0).toLocaleString()}</span>
            </div>
            
            ${currentOrder.total_quantity > 1 ? `
            <div class="flex justify-between items-center mb-4 pb-4 border-b border-gray-200">
              <span class="text-gray-600">Quantity:</span>
              <div class="flex items-center space-x-3 bg-white border border-gray-200 rounded-lg p-1 shadow-sm">
                <button onclick="updateQuantity(-1)" class="w-8 h-8 flex items-center justify-center rounded-md hover:bg-gray-100 text-gray-600 transition-colors disabled:opacity-50" ${selectedQuantity <= 1 ? 'disabled' : ''}>
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
                </button>
                <span class="font-bold text-gray-900 min-w-[20px] text-center">${selectedQuantity}</span>
                <button onclick="updateQuantity(1)" class="w-8 h-8 flex items-center justify-center rounded-md hover:bg-gray-100 text-gray-600 transition-colors disabled:opacity-50" ${selectedQuantity >= currentOrder.available_quantity ? 'disabled' : ''}>
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </button>
              </div>
            </div>
            ` : ''}

            <div class="flex justify-between items-center text-lg">
              <span class="font-bold text-gray-900">Total:</span>
              <span class="font-bold text-green-600">KES ${totalAmount}</span>
            </div>
          </div>

          <div class="space-y-4">
            ${isDemoMode ? `
            <div class="bg-blue-50 border border-blue-200 text-blue-700 p-3 rounded-lg mb-2 text-sm font-medium">
              <strong class="font-bold">Demo Mode Active:</strong> No real payment is required.
            </div>
            ` : `
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">M-Pesa Phone Number</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <span class="text-gray-500 sm:text-sm">📞</span>
                </div>
                <input type="tel" id="buyerPhoneText" class="w-full border-gray-300 border rounded-lg pl-10 p-3 text-lg focus:ring-green-500 focus:border-green-500" placeholder="07XX XXX XXX" value="${currentOrder.buyer_phone || ''}">
              </div>
            </div>
            `}

            <div>
              <div class="flex justify-between items-center mb-1">
                <label class="block text-sm font-medium text-gray-700">Delivery Location</label>
                <button onclick="requestGPS()" class="text-xs text-green-600 font-medium hover:underline flex items-center gap-1 focus:outline-none">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                  Get GPS
                </button>
              </div>
              <textarea id="locationText" onchange="currentLocationText = this.value" rows="2" class="w-full border-gray-300 border rounded-lg p-3 text-sm focus:ring-green-500 focus:border-green-500" placeholder="e.g. Nairobi CBD, Moi Avenue, next to...">${currentLocationText}</textarea>
              <p id="gpsStatusText" class="text-xs text-gray-500 mt-1"></p>
            </div>

            ${isDemoMode ? `
            <button onclick="submitDemoPayment()" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-lg transition-colors flex items-center justify-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
              Simulate Payment (Demo)
            </button>
            ` : `
            <button onclick="submitSTKPush()" id="submitBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 px-4 rounded-lg transition-colors flex items-center justify-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
              Pay KES ${totalAmount} with M-Pesa
            </button>
            `}
            <p id="systemMessage" class="text-sm text-center text-red-500 hidden mt-2"></p>
          </div>

          <p class="text-xs text-gray-400 text-center mt-4 mb-2 flex items-center justify-center gap-1">🔒 Payments secured by <img src="/assets/intasend-logo-light.png" alt="IntaSend" class="h-5 inline-block align-middle"></p>

          <div class="mt-8 text-center">
            <p class="text-xs text-gray-400 font-medium tracking-wide">POWERED BY <span class="text-green-600 font-bold">QUIKKA</span></p>
          </div>
        `;
        
        if (!gpsRequested) {
          gpsRequested = true;
          setTimeout(requestGPS, 300);
          }
      } else if (currentPurchaseStatus === 'stk_pending') {
        // Show waiting-for-payment screen
        app.innerHTML = `
          <div class="text-center py-8">
            <div class="mx-auto mb-4">
              <svg class="animate-spin h-12 w-12 text-green-600 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
            </div>
            <h2 class="text-xl font-bold text-gray-900 mb-2">Check your phone</h2>
            <p class="text-gray-500 text-sm mb-4">An M-Pesa payment prompt has been sent to your phone.<br>Enter your PIN to complete the payment.</p>
            <div class="bg-yellow-50 border border-yellow-100 rounded-lg p-3 mt-4">
              <p class="text-xs text-yellow-700">Don't see the prompt? Make sure your phone is on and check your M-Pesa notifications.</p>
            </div>
          </div>
          <div class="mt-8 text-center border-t border-gray-100 pt-4 flex items-center justify-center gap-3">
            <p class="text-xs text-gray-400 font-medium tracking-wide">POWERED BY <span class="text-green-600 font-bold">QUIKKA</span></p>
            <span class="text-gray-300 text-xs">|</span>
            <img src="/assets/intasend-logo-light.png" alt="Secured by IntaSend" class="h-4 object-contain opacity-60">
          </div>
        `;
      } else {
        const displayStatus = currentOrder.status;
        
        if (displayStatus === 'ticket_generated') {
          // Fallback if we reach here, redirect immediately
          window.location.href = `/receipt/${currentPurchaseId || currentOrder.id}`;
          return;
        }

        const statuses = {
          'awaiting_verification': { bg: 'bg-yellow-100', text: 'text-yellow-800', msg: 'Verifying Payment...' },
          'rejected': { bg: 'bg-red-100', text: 'text-red-800', msg: 'Payment Rejected ❌' }
        };
        const st = statuses[displayStatus] || { bg: 'bg-gray-100', text: 'text-gray-800', msg: displayStatus.replace(/_/g, ' ') };

        app.innerHTML = `
          <div class="text-center py-6">
            <h2 class="text-2xl font-bold text-gray-900 mb-4">${currentMerchant?.display_name || 'Checkout'}</h2>
            <div class="inline-block px-4 py-2 rounded-full font-bold uppercase tracking-wide text-sm ${st.bg} ${st.text}">
              ${st.msg}
            </div>
            <p class="text-gray-500 mt-6 text-sm mb-4">Please keep this page open to track your delivery.</p>
          </div>
          <div class="mt-8 text-center border-t border-gray-100 pt-4">
            <p class="text-xs text-gray-400 font-medium tracking-wide">POWERED BY <span class="text-green-600 font-bold">QUIKKA</span></p>
          </div>
        `;
      }
    }

    async function requestGPS() {
      const statusText = document.getElementById('gpsStatusText');
      const locationInput = document.getElementById('locationText');
      if (!statusText || !locationInput) return;
      
      statusText.innerHTML = '<span class="text-yellow-600 animate-pulse">📍 Fetching your location...</span>';
      
      if (!navigator.geolocation) {
        statusText.innerHTML = '<span class="text-red-500">Geolocation is not supported. Please type manually.</span>';
        return;
      }
      
      navigator.geolocation.getCurrentPosition(
        async (position) => {
          currentLat = position.coords.latitude;
          currentLon = position.coords.longitude;
          statusText.innerHTML = '<span class="text-green-600">✅ GPS location acquired.</span>';
          
          try {
            // Free Reverse Geocoding via OpenStreetMap Nominatim
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLon}`);
            if (res.ok) {
              const data = await res.json();
              if (data && data.display_name) {
                 currentLocationText = data.display_name;
                 locationInput.value = currentLocationText;
              }
            }
          } catch(e) {
             if (!currentLocationText) {
                currentLocationText = `Lat: ${currentLat.toFixed(5)}, Lon: ${currentLon.toFixed(5)}`;
                locationInput.value = currentLocationText;
             }
          }
        },
        (error) => {
          console.error(error);
          statusText.innerHTML = '<span class="text-red-500">❌ Failed to get GPS. Please type manually.</span>';
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    async function submitSTKPush() {
      const phoneRaw = document.getElementById('buyerPhoneText')?.value.trim();
      const locationText = document.getElementById('locationText')?.value.trim();
      const msgLabel = document.getElementById('systemMessage');
      const btn = document.getElementById('submitBtn');
      msgLabel.classList.remove('hidden');

      if (!phoneRaw || phoneRaw.length < 9) {
        msgLabel.innerText = "Please enter a valid M-Pesa phone number.";
        return;
      }

      // Normalize phone: 07xx -> 2547xx, +254 -> 254
      let phone = phoneRaw.replace(/\s+/g, '').replace(/^(\+)/, '');
      if (phone.startsWith('0')) {
        phone = '254' + phone.substring(1);
      }

      msgLabel.innerText = "Sending M-Pesa prompt to your phone...";
      msgLabel.classList.replace('text-red-500', 'text-blue-500');
      btn.disabled = true;
      btn.innerHTML = "Sending...";

      try {
        const payload = {
          order_id: currentOrder.id,
          phone_number: phone,
          quantity: selectedQuantity
        };
        if (locationText) {
          payload.location_text = locationText;
        }
        if (currentLat !== null && currentLon !== null) {
          payload.location_lat = currentLat;
          payload.location_long = currentLon;
        }

        const res = await fetch(`${BACKEND_URL}/payments/stk-push`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true'
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.detail || "Failed to initiate payment.");
        }

        const responseData = await res.json();
        currentPurchaseId = responseData.receipt_token || responseData.purchase_id; // Support both for safety, but expect token
        localStorage.setItem(`quikka_purchase_${currentOrder.id}`, currentPurchaseId);

        // Show waiting screen and start polling
        currentPurchaseStatus = 'stk_pending';
        renderApp();
        startPurchasePolling();

      } catch (e) {
        msgLabel.classList.replace('text-blue-500', 'text-red-500');
        msgLabel.innerText = e.message;
        btn.disabled = false;
        btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg> Retry Payment`;
      }
    }

    async function submitDemoPayment() {
      const locationText = document.getElementById('locationText')?.value.trim();
      const msgLabel = document.getElementById('systemMessage');
      const btn = document.getElementById('submitBtn');
      msgLabel.classList.remove('hidden');

      msgLabel.innerText = "Simulating payment...";
      msgLabel.classList.replace('text-red-500', 'text-blue-500');
      btn.disabled = true;
      btn.innerHTML = "Processing...";

      try {
        const payload = {
          order_id: currentOrder.id,
          phone_number: "+1000DEMO000",
          quantity: selectedQuantity
        };
        if (locationText) {
          payload.location_text = locationText;
        }
        if (currentLat !== null && currentLon !== null) {
          payload.location_lat = currentLat;
          payload.location_long = currentLon;
        }

        const res = await fetch(`${BACKEND_URL}/payments/demo-checkout`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true'
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.detail || "Failed to initiate demo payment.");
        }

        const responseData = await res.json();
        const receiptToken = responseData.receipt_token || responseData.purchase_id;
        
        // Demo payment completes instantly, redirect directly to receipt
        window.location.href = `/receipt/${receiptToken}?demo=true`;

      } catch (e) {
        msgLabel.classList.replace('text-blue-500', 'text-red-500');
        msgLabel.innerText = e.message;
        btn.disabled = false;
        btn.innerHTML = `Simulate Payment (Demo)`;
      }
    }


    function startPurchasePolling() {
      if (purchasePollInterval) return;
      purchasePollInterval = setInterval(async () => {
        if (!currentPurchaseId) {
          clearInterval(purchasePollInterval);
          purchasePollInterval = null;
          return;
        }
        try {
          const res = await fetch(`${BACKEND_URL}/payments/receipts/${currentPurchaseId}`, {
            headers: {
              'ngrok-skip-browser-warning': 'true'
            }
          });
          if (res.ok) {
            const data = await res.json();
            if (data.status === 'completed') {
              clearInterval(purchasePollInterval);
              purchasePollInterval = null;
              currentPurchaseId = null;
              currentPurchaseStatus = 'completed';
              currentOrder.status = 'ticket_generated'; // Force UI update
              // Clear localStorage so they can buy again if they revisit checkout
              localStorage.removeItem(`quikka_purchase_${currentOrder.id}`);
              // Redirect immediately instead of rendering inline
              window.location.href = `/receipt/${data.receipt_token}`;
            } else if (data.status === 'failed') {
              clearInterval(purchasePollInterval);
              purchasePollInterval = null;
              currentPurchaseId = null;
              localStorage.removeItem(`quikka_purchase_${currentOrder.id}`);
              currentOrder.status = 'payment_failed';
              renderApp();
            }
          }
        } catch (e) {}
      }, 3000);
    }

    // Init App
    if (pathParts.length === 0) {
      renderLandingPage();
    } else {
      fetchOrder();
    }

    // Add copyToClipboard function globally
    window.copyToClipboard = function (elementId) {
      const el = document.getElementById(elementId);
      if (!el) return;
      const text = el.innerText || el.textContent;
      if (!navigator.clipboard) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
      } else {
        navigator.clipboard.writeText(text);
      }
    };
  </script>
</body>
</html>
